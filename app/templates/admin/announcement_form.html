{% extends "base.html" %}

{% block title %}{{ '编辑公告' if announcement else '发布公告' }}{% endblock %}

{% block content %}
<div class="page-header">
  <h1>📢 {{ '编辑公告' if announcement else '发布公告' }}</h1>
</div>

<div class="card" style="max-width:700px;">
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label>标题</label>
      <input type="text" name="title" class="form-control" required
             placeholder="公告标题"
             value="{{ announcement.title if announcement else '' }}">
    </div>
    <div class="form-group">
      <label>内容</label>
      <textarea name="content" class="form-control" rows="8" required
                placeholder="输入公告内容..."
                style="min-height:200px; font-family:var(--font-sans);">{{ announcement.content if announcement else '' }}</textarea>
    </div>
    <div class="form-group">
      <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
        <input type="checkbox" name="is_pinned" {% if announcement and announcement.is_pinned %}checked{% endif %}>
        📌 置顶公告
      </label>
    </div>
    <div class="flex-gap">
      <button type="submit" class="btn btn-primary">{{ '更新' if announcement else '发布' }}</button>
      <a href="{{ url_for('admin.announcements') }}" class="btn btn-outline">取消</a>
    </div>
  </form>
</div>

{% endblock %}
