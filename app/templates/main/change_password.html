{% extends "base.html" %}

{% block title %}修改密码{% endblock %}

{% block content %}
<div class="page-header">
  <h1>🔐 修改密码</h1>
</div>

<div class="card" style="max-width:500px;">
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label>当前密码</label>
      <input type="password" name="old_password" class="form-control" required placeholder="输入当前密码">
    </div>
    <div class="form-group">
      <label>新密码</label>
      <input type="password" name="new_password" class="form-control" required placeholder="至少 6 位">
    </div>
    <div class="form-group">
      <label>确认新密码</label>
      <input type="password" name="confirm_password" class="form-control" required placeholder="再次输入新密码">
    </div>
    <div class="flex-gap">
      <button type="submit" class="btn btn-primary">确认修改</button>
      <a href="{{ url_for('main.index') }}" class="btn btn-outline">取消</a>
    </div>
  </form>
</div>

{% endblock %}
