{% extends "base.html" %}

{% block title %}{{ announcement.title }}{% endblock %}

{% block content %}
<div class="page-header">
  <div class="flex-gap mb-2">
    {% if announcement.is_pinned %}
      <span class="badge badge-danger">📌 置顶</span>
    {% endif %}
    <span class="text-muted" style="font-size:0.85em;">{{ announcement.created_at | datetime_format('%Y-%m-%d %H:%M') }}</span>
  </div>
  <h1>{{ announcement.title }}</h1>
</div>

<div class="card" style="max-width:800px;">
  <div style="font-size:1em; line-height:1.8; white-space:pre-wrap;">{{ announcement.content }}</div>
</div>

<div style="margin-top:24px;">
  <a href="{{ url_for('main.announcement_list') }}" class="btn btn-outline">← 返回公告列表</a>
</div>

{% endblock %}
